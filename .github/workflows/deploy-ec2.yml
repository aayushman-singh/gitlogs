name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: api-gitlogs.aayushman.dev
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ~/gitlogs
            git pull --ff-only
            npm ci
            test -f src/server.js
            grep -q "/api/me/dashboard" src/server.js

            DEPLOY_DIR="$(pwd -P)"
            NODE_BIN="$(command -v node)"
            PORT="$(grep -E '^PORT=' .env 2>/dev/null | tail -n 1 | cut -d= -f2- || true)"
            PORT="${PORT:-3000}"

            sudo mkdir -p /etc/systemd/system/gitlogs.service.d
            {
              echo "[Service]"
              echo "WorkingDirectory=${DEPLOY_DIR}"
              echo "ExecStart="
              echo "ExecStart=${NODE_BIN} src/server.js"
            } | sudo tee /etc/systemd/system/gitlogs.service.d/deploy-path.conf >/dev/null

            sudo systemctl daemon-reload
            sudo systemctl restart gitlogs
            sudo systemctl --no-pager status gitlogs | head -n 5

            for attempt in 1 2 3 4 5; do
              status="$(curl -sS -o /tmp/gitlogs-dashboard-response.json -w "%{http_code}" "http://127.0.0.1:${PORT}/api/me/dashboard" || true)"
              if [ "$status" = "401" ]; then
                echo "Dashboard endpoint is present on restarted service."
                break
              fi
              echo "Dashboard endpoint probe attempt ${attempt} returned HTTP ${status}:"
              cat /tmp/gitlogs-dashboard-response.json || true
              if [ "$attempt" = "5" ]; then
                echo "Dashboard endpoint did not come up after restart." >&2
                exit 1
              fi
              sleep 2
            done

            echo "::group::Proxy diagnostics"
            echo "PORT=${PORT}"
            echo "remote_ipv4=$(curl -4fsS https://ifconfig.me || true)"
            echo "api_dns=$(getent ahostsv4 api-gitlogs.aayushman.dev | awk '{print $1; exit}' || true)"
            sudo systemctl cat gitlogs || true
            sudo systemctl cat caddy || true
            sudo systemctl cat nginx || true
            sudo sed -n '1,220p' /etc/caddy/Caddyfile || true
            sudo find /etc/nginx -maxdepth 3 -type f \( -name '*.conf' -o -name 'sites-*' \) -print -exec sed -n '1,220p' {} \; || true
            sudo ss -ltnp || true
            curl -sS -i -H 'Host: api-gitlogs.aayushman.dev' "http://127.0.0.1/api/me/dashboard" | sed -n '1,40p' || true
            curl -sS -i https://api-gitlogs.aayushman.dev/api/me/dashboard | sed -n '1,40p' || true
            echo "::endgroup::"
