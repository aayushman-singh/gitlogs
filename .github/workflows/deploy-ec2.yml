name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Public API origin the SPA is built against. Set this as a repo
          # Actions *variable* (Settings → Variables), NOT hardcoded — there is
          # no safe default (the old gitlogs host is dead).
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: VITE_API_BASE
          script: |
            set -euo pipefail
            cd ~/gitlogs
            git pull --ff-only
            npm ci
            npm --prefix frontend ci
            npm run build
            sudo systemctl restart gitlogs
            sudo systemctl --no-pager status gitlogs | head -n 5
