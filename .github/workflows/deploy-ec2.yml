name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -eu
            cd ~/gitlogs
            git pull --ff-only origin main
            pnpm install
            pnpm --dir frontend run build
            sudo systemctl restart gitlogs
            curl --fail --show-error --silent https://api-gitlogs.aayushman.dev/api/health
            curl --fail --show-error --silent https://gitlogs.aayushman.dev/ >/dev/null
            curl --fail --show-error --silent https://gitlogs.aayushman.dev/dashboard >/dev/null
