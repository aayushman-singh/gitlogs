name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ~/gitlogs
            git pull --ff-only
            # Reproducible installs from the committed lockfiles.
            pnpm install --frozen-lockfile
            pnpm --dir frontend install --frozen-lockfile
            # Build the SPA BEFORE restarting — the backend serves frontend/dist
            # (src/server.js). Without this the served frontend is stale/missing.
            VITE_API_BASE="${VITE_API_BASE:-https://api-gitlogs.aayushman.dev}" \
              pnpm --dir frontend run build
            sudo systemctl restart gitlogs
            sudo systemctl --no-pager status gitlogs | head -n 5
