name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Public API origin the SPA is built against. Set this as a repo
          # Actions *variable* (Settings → Variables), or define API_BASE_URL
          # in the host .env. There is no hardcoded default.
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: VITE_API_BASE
          script: |
            set -euo pipefail
            cd ~/gitlogs
            git pull --ff-only
            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi
            export VITE_API_BASE="${VITE_API_BASE:-${API_BASE_URL:-}}"
            : "${VITE_API_BASE:?Set repo variable VITE_API_BASE or API_BASE_URL in ~/gitlogs/.env}"
            npm ci
            npm --prefix frontend ci --include=dev
            npm run build
            sudo systemctl restart gitlogs
            sudo systemctl --no-pager status gitlogs | head -n 5
