name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="${GITLOGS_DEPLOY_DIR:-$HOME/gitlogs}"
            REPO_URL="https://github.com/aayushman-singh/gitlogs.git"

            if [ ! -d "$DEPLOY_DIR" ]; then
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "$DEPLOY_DIR exists but is not a git checkout." >&2
              exit 1
            fi

            cd "$DEPLOY_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            cat > .env <<EOF
            NODE_ENV=production
            PORT=3000
            FRONTEND_URL=https://gitlogs.aayushman.dev
            API_BASE_URL=https://api-gitlogs.aayushman.dev
            OAUTH_CALLBACK_URL=https://api-gitlogs.aayushman.dev/auth/x/callback
            DATABASE_PATH=./tweets.db
            ENABLE_THREADING=true
            MULTI_USER_ENABLED=true
            ALLOWED_REPOS=
            GITHUB_CLIENT_ID=${{ secrets.GITLOGS_GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.GITLOGS_GITHUB_CLIENT_SECRET }}
            OAUTH_CLIENT_ID=${{ secrets.GITLOGS_X_CLIENT_ID }}
            OAUTH_CLIENT_SECRET=${{ secrets.GITLOGS_X_CLIENT_SECRET }}
            GEMINI_API_KEY=${{ secrets.GITLOGS_GEMINI_API_KEY }}
            GEMINI_MODEL=gemini-2.0-flash
            WEBHOOK_SECRET=${{ secrets.GITLOGS_WEBHOOK_SECRET }}
            ADMIN_API_KEY=${{ secrets.GITLOGS_ADMIN_API_KEY }}
            EOF
            sed -i 's/^            //' .env
            for key in GITHUB_CLIENT_ID GITHUB_CLIENT_SECRET OAUTH_CLIENT_ID OAUTH_CLIENT_SECRET GEMINI_API_KEY WEBHOOK_SECRET; do
              if ! grep -Eq "^${key}=.+" .env; then
                echo "Missing required GitHub Actions secret for ${key}." >&2
                exit 1
              fi
            done
            npm ci
            test -f src/server.js
            grep -q "/api/me/dashboard" src/server.js

            DEPLOY_DIR="$(pwd -P)"
            NODE_BIN="$(command -v node)"
            PORT="$(grep -E '^PORT=' .env 2>/dev/null | tail -n 1 | cut -d= -f2- || true)"
            PORT="${PORT:-3000}"

            {
              echo "[Unit]"
              echo "Description=Gitlogs"
              echo "After=network.target"
              echo
              echo "[Service]"
              echo "Type=simple"
              echo "User=$(id -un)"
              echo "WorkingDirectory=${DEPLOY_DIR}"
              echo "Environment=NODE_ENV=production"
              echo "Environment=PORT=${PORT}"
              echo "EnvironmentFile=-${DEPLOY_DIR}/.env"
              echo "ExecStart=${NODE_BIN} src/server.js"
              echo "Restart=always"
              echo "RestartSec=10"
              echo
              echo "[Install]"
              echo "WantedBy=multi-user.target"
            } | sudo tee /etc/systemd/system/gitlogs.service >/dev/null

            sudo mkdir -p /etc/systemd/system/gitlogs.service.d
            {
              echo "[Service]"
              echo "WorkingDirectory=${DEPLOY_DIR}"
              echo "ExecStart="
              echo "ExecStart=${NODE_BIN} src/server.js"
            } | sudo tee /etc/systemd/system/gitlogs.service.d/deploy-path.conf >/dev/null

            sudo systemctl daemon-reload
            sudo systemctl enable gitlogs
            sudo systemctl restart gitlogs
            sudo systemctl --no-pager status gitlogs | head -n 5

            for attempt in 1 2 3 4 5; do
              status="$(curl -sS -o /tmp/gitlogs-dashboard-response.json -w "%{http_code}" "http://127.0.0.1:${PORT}/api/me/dashboard" || true)"
              if [ "$status" = "401" ]; then
                echo "Dashboard endpoint is present on restarted service."
                break
              fi
              echo "Dashboard endpoint probe attempt ${attempt} returned HTTP ${status}:"
              cat /tmp/gitlogs-dashboard-response.json || true
              if [ "$attempt" = "5" ]; then
                echo "Dashboard endpoint did not come up after restart." >&2
                exit 1
              fi
              sleep 2
            done

            remote_ipv4="$(curl -4fsS https://ifconfig.me || true)"
            api_dns="$(getent ahostsv4 api-gitlogs.aayushman.dev | awk '{print $1; exit}' || true)"
            if [ -n "$remote_ipv4" ] && [ -n "$api_dns" ] && [ "$remote_ipv4" != "$api_dns" ]; then
              echo "EC2 deploy host does not match live API DNS for api-gitlogs.aayushman.dev." >&2
              echo "Update EC2_HOST to the live API host, or point api-gitlogs.aayushman.dev at this deploy host." >&2
              exit 1
            fi

            public_status="$(curl -sS -o /tmp/gitlogs-public-dashboard-response.json -w "%{http_code}" https://api-gitlogs.aayushman.dev/api/me/dashboard || true)"
            if [ "$public_status" != "401" ]; then
              echo "Public dashboard endpoint probe returned HTTP ${public_status}:" >&2
              cat /tmp/gitlogs-public-dashboard-response.json >&2 || true
              exit 1
            fi
