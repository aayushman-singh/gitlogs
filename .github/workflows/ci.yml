name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (syntax + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (frozen lockfile)
        run: npm ci

      # No ESLint is configured yet; use node --check as a lightweight syntax
      # gate so a broken file fails CI. (Full ESLint setup is a tracked follow-up.)
      - name: Syntax check (node --check)
        run: |
          find src scripts -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Test (Vitest)
        run: npm test

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (frozen lockfile)
        run: npm --prefix frontend ci

      - name: Build SPA
        env:
          # Build-validation only; value is irrelevant here (the SPA isn't served
          # from CI). Real deploys set VITE_API_BASE to the actual API origin.
          VITE_API_BASE: https://api.example.invalid
        run: npm --prefix frontend run build
